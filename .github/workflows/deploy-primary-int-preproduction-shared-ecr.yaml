name: Deploy-primary-int-preproduction-shared-ECR

on:
  push:
    branches:
      - main
    paths:
      - "Container-apps/AfricaLetTalk/frontend/**"
      - "Container-apps/AfricaLetTalk/backend/**"
      - ".github/workflows/deploy-primary-int-preproduction-shared-ecr.yaml"
  workflow_dispatch:
    inputs:
      service:
        description: "Select the service to deploy"
        required: true
        type: choice
        options:
          - "all"
          - "frontend"
          - "backend"
      deploy_type:
        description: "Deploy latest build or a specific version?"
        required: true
        type: choice
        options:
          - "new-build"
          - "existing-version"
      frontend_tag:
        description: "Frontend tag to use e.g. v13 (required for all deploy types)"
        required: true
        type: string
      backend_tag:
        description: "Backend tag to use e.g. v13 (required for all deploy types)"
        required: true
        type: string
      environment:
        description: "Select the environment"
        required: true
        type: choice
        options:
          - "int-preproduction"

env:
  IAM_ROLE: arn:aws:iam::730335294148:role/int-OIDCGitHubRole-role
  REGION: us-east-1
  ECR_REGISTRY: 730335294148.dkr.ecr.us-east-1.amazonaws.com
  ECR_REPO: int-preproduction-use1-ecs
  FRONTEND_CONTAINER_NAME: frontend
  BACKEND_CONTAINER_NAME: backend
  ECS_CLUSTER: int-preproduction-use1-shared-letsconnect
  FRONTEND_TASK_DEF: int-preproduction-use1-shared-frontend
  BACKEND_TASK_DEF: int-preproduction-use1-shared-backend
  FRONTEND_ECS_SERVICE: int-preproduction-use1-shared-frontend-service
  BACKEND_ECS_SERVICE: int-preproduction-use1-shared-backend-service

permissions:
  packages: write
  contents: read
  id-token: write

jobs:
  #------------------------------------------------------------------
  # Detect which services changed (code push only)
  #------------------------------------------------------------------
  Detect-Changes:
    runs-on: ubuntu-latest
    outputs:
      frontend_changed: ${{ steps.filter.outputs.frontend }}
      backend_changed:  ${{ steps.filter.outputs.backend }}
    steps:
      - name: Clone the repository
        uses: actions/checkout@v4

      - name: Detect changed paths
        uses: dorny/paths-filter@v2
        id: filter
        with:
          filters: |
            frontend:
              - 'Container-apps/AfricaLetTalk/frontend/**'
            backend:
              - 'Container-apps/AfricaLetTalk/backend/**'

  #------------------------------------------------------------------
  # Verify ECS cluster exists before doing anything
  #------------------------------------------------------------------
  Verify-Cluster:
    runs-on: ubuntu-latest
    outputs:
      cluster_exists: ${{ steps.check.outputs.cluster_exists }}
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v1.7.0
        with:
          role-to-assume: ${{ env.IAM_ROLE }}
          role-session-name: GitHub_to_AWS_via_FederatedOIDC
          aws-region: ${{ env.REGION }}

      - name: Check ECS cluster exists
        id: check
        run: |
          CLUSTER_STATUS=$(aws ecs describe-clusters \
            --clusters ${{ env.ECS_CLUSTER }} \
            --region ${{ env.REGION }} \
            --query 'clusters[0].status' \
            --output text 2>/dev/null || echo "NOT_FOUND")

          echo "Cluster: ${{ env.ECS_CLUSTER }}"
          echo "Status:  ${CLUSTER_STATUS}"

          if [ "$CLUSTER_STATUS" == "ACTIVE" ]; then
            echo "cluster_exists=true"  >> $GITHUB_OUTPUT
            echo "✅ ECS cluster found and ACTIVE — deployment will proceed" >> $GITHUB_STEP_SUMMARY
          else
            echo "cluster_exists=false" >> $GITHUB_OUTPUT
            echo "## ⚠️ ECS Cluster Not Found"                                          >> $GITHUB_STEP_SUMMARY
            echo "Cluster \`${{ env.ECS_CLUSTER }}\` does not exist or is not ACTIVE." >> $GITHUB_STEP_SUMMARY
            echo "Images will be pushed to ECR but deployment will be skipped."         >> $GITHUB_STEP_SUMMARY
            echo "Status returned: \`${CLUSTER_STATUS}\`"                               >> $GITHUB_STEP_SUMMARY
          fi

  #------------------------------------------------------------------
  # Build and push frontend image to ECR
  #------------------------------------------------------------------
  Build-Frontend:
    needs: [Detect-Changes, Verify-Cluster]
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'push' && needs.Detect-Changes.outputs.frontend_changed == 'true') ||
      (github.event_name == 'workflow_dispatch' &&
      (github.event.inputs.service == 'frontend' || github.event.inputs.service == 'all') &&
      github.event.inputs.deploy_type == 'new-build')
    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}
    defaults:
      run:
        shell: bash
        working-directory: Container-apps/AfricaLetTalk/frontend
    steps:
      - name: Clone the repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v1.7.0
        with:
          role-to-assume: ${{ env.IAM_ROLE }}
          role-session-name: GitHub_to_AWS_via_FederatedOIDC
          aws-region: ${{ env.REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Generate and verify image tag
        id: meta
        run: |
          # For push events, auto-generate tag from short SHA
          # For workflow_dispatch, use the user-provided tag
          if [ "${{ github.event_name }}" == "push" ]; then
            SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
            NEW_TAG="frontend-sha-${SHORT_SHA}"
          else
            NEW_TAG="frontend-${{ github.event.inputs.frontend_tag }}"
          fi

          echo "Checking if ${NEW_TAG} already exists in ECR..."

          EXISTING=$(aws ecr describe-images \
            --repository-name ${{ env.ECR_REPO }} \
            --query 'imageDetails[*].imageTags' \
            --output json | \
            jq -r '.[] | .[]? | select(. == "'${NEW_TAG}'")')

          if [ -n "$EXISTING" ]; then
            echo "❌ Tag ${NEW_TAG} already exists in ECR. Aborting to prevent overwrite." >> $GITHUB_STEP_SUMMARY
            echo "❌ Tag ${NEW_TAG} already exists in ECR. A build with this tag has already been pushed."
            echo "   Use a different tag or deploy the existing version using deploy_type = existing-version"
            exit 1
          fi

          echo "✅ Tag ${NEW_TAG} does not exist — proceeding with build" >> $GITHUB_STEP_SUMMARY
          echo "image_tag=${NEW_TAG}" >> $GITHUB_OUTPUT

          echo "## Frontend Build"           >> $GITHUB_STEP_SUMMARY
          echo "Tag: \`${NEW_TAG}\`"         >> $GITHUB_STEP_SUMMARY
          echo "SHA: \`${{ github.sha }}\`"  >> $GITHUB_STEP_SUMMARY

      - name: Build and push frontend image
        run: |
          docker build \
            -t ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPO }}:${{ steps.meta.outputs.image_tag }} \
            -t ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPO }}:frontend-latest \
            .
          docker push ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPO }}:${{ steps.meta.outputs.image_tag }}
          docker push ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPO }}:frontend-latest
          echo "✅ Pushed: \`${{ env.ECR_REGISTRY }}/${{ env.ECR_REPO }}:${{ steps.meta.outputs.image_tag }}\`" >> $GITHUB_STEP_SUMMARY

      - name: Skip deployment notice
        if: needs.Verify-Cluster.outputs.cluster_exists != 'true'
        run: |
          echo "## ⚠️ Deployment Skipped"                                                >> $GITHUB_STEP_SUMMARY
          echo "Image was pushed to ECR successfully."                                   >> $GITHUB_STEP_SUMMARY
          echo "ECS cluster \`${{ env.ECS_CLUSTER }}\` was not found."                  >> $GITHUB_STEP_SUMMARY
          echo "Deploy manually once the cluster is provisioned using existing-version." >> $GITHUB_STEP_SUMMARY

  #------------------------------------------------------------------
  # Build and push backend image to ECR
  #------------------------------------------------------------------
  Build-Backend:
    needs: [Detect-Changes, Verify-Cluster]
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'push' && needs.Detect-Changes.outputs.backend_changed == 'true') ||
      (github.event_name == 'workflow_dispatch' &&
      (github.event.inputs.service == 'backend' || github.event.inputs.service == 'all') &&
      github.event.inputs.deploy_type == 'new-build')
    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}
    defaults:
      run:
        shell: bash
        working-directory: Container-apps/AfricaLetTalk/backend
    steps:
      - name: Clone the repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v1.7.0
        with:
          role-to-assume: ${{ env.IAM_ROLE }}
          role-session-name: GitHub_to_AWS_via_FederatedOIDC
          aws-region: ${{ env.REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Generate and verify image tag
        id: meta
        run: |
          # For push events, auto-generate tag from short SHA
          # For workflow_dispatch, use the user-provided tag
          if [ "${{ github.event_name }}" == "push" ]; then
            SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
            NEW_TAG="backend-sha-${SHORT_SHA}"
          else
            NEW_TAG="backend-${{ github.event.inputs.backend_tag }}"
          fi

          echo "Checking if ${NEW_TAG} already exists in ECR..."

          EXISTING=$(aws ecr describe-images \
            --repository-name ${{ env.ECR_REPO }} \
            --query 'imageDetails[*].imageTags' \
            --output json | \
            jq -r '.[] | .[]? | select(. == "'${NEW_TAG}'")')

          if [ -n "$EXISTING" ]; then
            echo "❌ Tag ${NEW_TAG} already exists in ECR. Aborting to prevent overwrite." >> $GITHUB_STEP_SUMMARY
            echo "❌ Tag ${NEW_TAG} already exists in ECR. A build with this tag has already been pushed."
            echo "   Use a different tag or deploy the existing version using deploy_type = existing-version"
            exit 1
          fi

          echo "✅ Tag ${NEW_TAG} does not exist — proceeding with build" >> $GITHUB_STEP_SUMMARY
          echo "image_tag=${NEW_TAG}" >> $GITHUB_OUTPUT

          echo "## Backend Build"           >> $GITHUB_STEP_SUMMARY
          echo "Tag: \`${NEW_TAG}\`"        >> $GITHUB_STEP_SUMMARY
          echo "SHA: \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY

      - name: Build and push backend image
        run: |
          docker build \
            -t ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPO }}:${{ steps.meta.outputs.image_tag }} \
            -t ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPO }}:backend-latest \
            .
          docker push ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPO }}:${{ steps.meta.outputs.image_tag }}
          docker push ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPO }}:backend-latest
          echo "✅ Pushed: \`${{ env.ECR_REGISTRY }}/${{ env.ECR_REPO }}:${{ steps.meta.outputs.image_tag }}\`" >> $GITHUB_STEP_SUMMARY

      - name: Skip deployment notice
        if: needs.Verify-Cluster.outputs.cluster_exists != 'true'
        run: |
          echo "## ⚠️ Deployment Skipped"                                                >> $GITHUB_STEP_SUMMARY
          echo "Image was pushed to ECR successfully."                                   >> $GITHUB_STEP_SUMMARY
          echo "ECS cluster \`${{ env.ECS_CLUSTER }}\` was not found."                  >> $GITHUB_STEP_SUMMARY
          echo "Deploy manually once the cluster is provisioned using existing-version." >> $GITHUB_STEP_SUMMARY

  #------------------------------------------------------------------
  # Approve before deploying to ECS (main branch only)
  #------------------------------------------------------------------
  Approve:
    needs: [Build-Frontend, Build-Backend, Verify-Cluster]
    runs-on: ubuntu-latest
    if: |
      always() &&
      needs.Verify-Cluster.outputs.cluster_exists == 'true' &&
      github.ref == 'refs/heads/main' &&
      (needs.Build-Frontend.result == 'success' || needs.Build-Backend.result == 'success' ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.deploy_type == 'existing-version'))
    environment:
      name: production
    steps:
      - name: Awaiting approval before deploying to ECS
        run: |
          echo "## Approval Gate"                                                             >> $GITHUB_STEP_SUMMARY
          echo "Deploy type: \`${{ github.event.inputs.deploy_type }}\`"                     >> $GITHUB_STEP_SUMMARY
          echo "Frontend tag: \`frontend-${{ github.event.inputs.frontend_tag }}\`"          >> $GITHUB_STEP_SUMMARY
          echo "Backend tag:  \`backend-${{ github.event.inputs.backend_tag }}\`"            >> $GITHUB_STEP_SUMMARY
          echo "Cluster: \`${{ env.ECS_CLUSTER }}\`"                                        >> $GITHUB_STEP_SUMMARY
          echo "Waiting for manual approval..."

  #------------------------------------------------------------------
  # Deploy frontend to ECS
  #------------------------------------------------------------------
  Deploy-Frontend:
    needs: [Approve, Build-Frontend, Verify-Cluster]
    runs-on: ubuntu-latest
    if: |
      always() &&
      needs.Verify-Cluster.outputs.cluster_exists == 'true' &&
      needs.Approve.result == 'success' &&
      (needs.Build-Frontend.result == 'success' ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.deploy_type == 'existing-version' &&
      (github.event.inputs.service == 'frontend' || github.event.inputs.service == 'all')))
    defaults:
      run:
        shell: bash
    steps:
      - name: Clone the repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v1.7.0
        with:
          role-to-assume: ${{ env.IAM_ROLE }}
          role-session-name: GitHub_to_AWS_via_FederatedOIDC
          aws-region: ${{ env.REGION }}

      - name: Resolve and verify frontend image tag
        id: resolve
        run: |
          IMAGE_TAG="frontend-${{ github.event.inputs.frontend_tag }}"

          echo "Verifying \`${IMAGE_TAG}\` exists in ECR before deploying..."

          aws ecr describe-images \
            --repository-name ${{ env.ECR_REPO }} \
            --image-ids imageTag=${IMAGE_TAG} > /dev/null 2>&1 || \
            {
              echo "❌ Image ${IMAGE_TAG} not found in ECR"                   >> $GITHUB_STEP_SUMMARY
              echo "❌ Image ${IMAGE_TAG} not found in ECR. Cannot deploy."
              echo "   Push the image first using deploy_type = new-build"
              exit 1
            }

          echo "image_tag=${IMAGE_TAG}" >> $GITHUB_OUTPUT
          echo "✅ Image \`${IMAGE_TAG}\` verified in ECR — proceeding with deploy" >> $GITHUB_STEP_SUMMARY

      - name: Download current frontend task definition
        run: |
          aws ecs describe-task-definition \
            --task-definition ${{ env.FRONTEND_TASK_DEF }} \
            --query taskDefinition \
            > frontend-task-definition.json

      - name: Update frontend image in task definition
        id: frontend-task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: frontend-task-definition.json
          container-name: ${{ env.FRONTEND_CONTAINER_NAME }}
          image: ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPO }}:${{ steps.resolve.outputs.image_tag }}

      - name: Deploy frontend to ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v1
        with:
          task-definition: ${{ steps.frontend-task-def.outputs.task-definition }}
          service:         ${{ env.FRONTEND_ECS_SERVICE }}
          cluster:         ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true

      - name: Frontend deploy summary
        run: |
          echo "## Frontend Deployment"                                                                               >> $GITHUB_STEP_SUMMARY
          echo "✅ Deployed: \`${{ env.ECR_REGISTRY }}/${{ env.ECR_REPO }}:${{ steps.resolve.outputs.image_tag }}\`" >> $GITHUB_STEP_SUMMARY
          echo "Service: \`${{ env.FRONTEND_ECS_SERVICE }}\`"                                                        >> $GITHUB_STEP_SUMMARY
          echo "Cluster: \`${{ env.ECS_CLUSTER }}\`"                                                                 >> $GITHUB_STEP_SUMMARY

  #------------------------------------------------------------------
  # Deploy backend to ECS
  #------------------------------------------------------------------
  Deploy-Backend:
    needs: [Approve, Build-Backend, Verify-Cluster]
    runs-on: ubuntu-latest
    if: |
      always() &&
      needs.Verify-Cluster.outputs.cluster_exists == 'true' &&
      needs.Approve.result == 'success' &&
      (needs.Build-Backend.result == 'success' ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.deploy_type == 'existing-version' &&
      (github.event.inputs.service == 'backend' || github.event.inputs.service == 'all')))
    defaults:
      run:
        shell: bash
    steps:
      - name: Clone the repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v1.7.0
        with:
          role-to-assume: ${{ env.IAM_ROLE }}
          role-session-name: GitHub_to_AWS_via_FederatedOIDC
          aws-region: ${{ env.REGION }}

      - name: Resolve and verify backend image tag
        id: resolve
        run: |
          IMAGE_TAG="backend-${{ github.event.inputs.backend_tag }}"

          echo "Verifying \`${IMAGE_TAG}\` exists in ECR before deploying..."

          aws ecr describe-images \
            --repository-name ${{ env.ECR_REPO }} \
            --image-ids imageTag=${IMAGE_TAG} > /dev/null 2>&1 || \
            {
              echo "❌ Image ${IMAGE_TAG} not found in ECR"                   >> $GITHUB_STEP_SUMMARY
              echo "❌ Image ${IMAGE_TAG} not found in ECR. Cannot deploy."
              echo "   Push the image first using deploy_type = new-build"
              exit 1
            }

          echo "image_tag=${IMAGE_TAG}" >> $GITHUB_OUTPUT
          echo "✅ Image \`${IMAGE_TAG}\` verified in ECR — proceeding with deploy" >> $GITHUB_STEP_SUMMARY

      - name: Download current backend task definition
        run: |
          aws ecs describe-task-definition \
            --task-definition ${{ env.BACKEND_TASK_DEF }} \
            --query taskDefinition \
            > backend-task-definition.json

      - name: Update backend image in task definition
        id: backend-task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: backend-task-definition.json
          container-name: ${{ env.BACKEND_CONTAINER_NAME }}
          image: ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPO }}:${{ steps.resolve.outputs.image_tag }}

      - name: Deploy backend to ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v1
        with:
          task-definition: ${{ steps.backend-task-def.outputs.task-definition }}
          service:         ${{ env.BACKEND_ECS_SERVICE }}
          cluster:         ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true

      - name: Backend deploy summary
        run: |
          echo "## Backend Deployment"                                                                                >> $GITHUB_STEP_SUMMARY
          echo "✅ Deployed: \`${{ env.ECR_REGISTRY }}/${{ env.ECR_REPO }}:${{ steps.resolve.outputs.image_tag }}\`" >> $GITHUB_STEP_SUMMARY
          echo "Service: \`${{ env.BACKEND_ECS_SERVICE }}\`"                                                         >> $GITHUB_STEP_SUMMARY
          echo "Cluster: \`${{ env.ECS_CLUSTER }}\`"                                                                 >> $GITHUB_STEP_SUMMARY
