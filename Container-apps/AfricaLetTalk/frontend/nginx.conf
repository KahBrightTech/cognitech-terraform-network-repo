server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Required for dynamic DNS re-resolution (Cloud Map)
    # 169.254.169.253 is the AWS VPC DNS resolver
    # valid=10s forces re-resolution every 10 seconds after a deployment
    resolver 169.254.169.253 valid=10s ipv6=off;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/json;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    location /api/ {
        set $backend $BACKEND_URL;
        proxy_pass $backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 90;
        proxy_connect_timeout 10;
        client_max_body_size 10M;
    }

    location ^~ /uploads/frames/ {
        set $backend $BACKEND_URL;
        proxy_pass $backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    location ^~ /uploads/ {
        set $backend $BACKEND_URL;
        proxy_pass $backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        expires 7d;
        add_header Cache-Control "public";
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(jpg|jpeg|png|gif|ico|svg|woff|woff2|ttf|eot)$ {
        try_files $uri /index.html;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location ~* \.(css|js)$ {
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}