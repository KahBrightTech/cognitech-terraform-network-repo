<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="cogniGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="cogniGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f093fb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f5576c;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background circle -->
  <circle cx="100" cy="100" r="90" fill="url(#cogniGrad)" opacity="0.1"/>
  
  <!-- Brain/neural network inspired design -->
  <g transform="translate(100, 100)">
    <!-- Central circle -->
    <circle cx="0" cy="0" r="15" fill="url(#cogniGrad)" />
    
    <!-- Neural connections -->
    <g stroke="url(#cogniGrad2)" stroke-width="2.5" fill="none" opacity="0.7">
      <path d="M 0 -15 Q -30 -35, -45 -35" stroke-linecap="round"/>
      <path d="M 0 -15 Q 0 -45, 0 -60" stroke-linecap="round"/>
      <path d="M 0 -15 Q 30 -35, 45 -35" stroke-linecap="round"/>
      <path d="M 15 0 Q 35 -15, 55 -15" stroke-linecap="round"/>
      <path d="M 15 0 Q 40 10, 55 15" stroke-linecap="round"/>
      <path d="M 0 15 Q 25 35, 35 45" stroke-linecap="round"/>
      <path d="M 0 15 Q 0 40, 0 55" stroke-linecap="round"/>
      <path d="M 0 15 Q -25 35, -35 45" stroke-linecap="round"/>
      <path d="M -15 0 Q -35 15, -55 15" stroke-linecap="round"/>
      <path d="M -15 0 Q -40 -10, -55 -15" stroke-linecap="round"/>
    </g>
    
    <!-- Outer nodes -->
    <circle cx="-45" cy="-35" r="8" fill="url(#cogniGrad2)"/>
    <circle cx="0" cy="-60" r="8" fill="url(#cogniGrad2)"/>
    <circle cx="45" cy="-35" r="8" fill="url(#cogniGrad2)"/>
    <circle cx="55" cy="-15" r="8" fill="url(#cogniGrad2)"/>
    <circle cx="55" cy="15" r="8" fill="url(#cogniGrad2)"/>
    <circle cx="35" cy="45" r="8" fill="url(#cogniGrad2)"/>
    <circle cx="0" cy="55" r="8" fill="url(#cogniGrad2)"/>
    <circle cx="-35" cy="45" r="8" fill="url(#cogniGrad2)"/>
    <circle cx="-55" cy="15" r="8" fill="url(#cogniGrad2)"/>
    <circle cx="-55" cy="-15" r="8" fill="url(#cogniGrad2)"/>
    
    <!-- Inner highlight circles -->
    <circle cx="-45" cy="-35" r="3" fill="white" opacity="0.8"/>
    <circle cx="0" cy="-60" r="3" fill="white" opacity="0.8"/>
    <circle cx="45" cy="-35" r="3" fill="white" opacity="0.8"/>
    <circle cx="55" cy="-15" r="3" fill="white" opacity="0.8"/>
    <circle cx="55" cy="15" r="3" fill="white" opacity="0.8"/>
    <circle cx="35" cy="45" r="3" fill="white" opacity="0.8"/>
    <circle cx="0" cy="55" r="3" fill="white" opacity="0.8"/>
    <circle cx="-35" cy="45" r="3" fill="white" opacity="0.8"/>
    <circle cx="-55" cy="15" r="3" fill="white" opacity="0.8"/>
    <circle cx="-55" cy="-15" r="3" fill="white" opacity="0.8"/>
    <circle cx="0" cy="0" r="5" fill="white" opacity="0.9"/>
  </g>
</svg>
