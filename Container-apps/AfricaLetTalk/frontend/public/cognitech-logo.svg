<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#764ba2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f093fb;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#fbc2eb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a6c1ee;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad3" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f093fb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fbbf24;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Outer glow circle -->
  <circle cx="100" cy="100" r="90" fill="url(#grad1)" opacity="0.1"/>
  
  <!-- Main logo group -->
  <g transform="translate(100, 100)">
    
    <!-- Large decorative circle (ring) -->
    <circle cx="0" cy="0" r="65" fill="none" stroke="url(#grad1)" stroke-width="3" opacity="0.3"/>
    
    <!-- Chat bubble 1 (top left) -->
    <g transform="translate(-30, -25)">
      <path d="M -15 -10 Q -18 -10, -18 -7 L -18 7 Q -18 10, -15 10 L 10 10 Q 13 10, 13 7 L 13 -7 Q 13 -10, 10 -10 Z M -5 10 L -8 15 L -2 10 Z" 
            fill="url(#grad1)" filter="url(#glow)"/>
      <!-- Message dots inside -->
      <circle cx="-8" cy="0" r="2.5" fill="white" opacity="0.9"/>
      <circle cx="0" cy="0" r="2.5" fill="white" opacity="0.9"/>
      <circle cx="8" cy="0" r="2.5" fill="white" opacity="0.9"/>
    </g>
    
    <!-- Chat bubble 2 (top right) -->
    <g transform="translate(30, -20)">
      <path d="M -12 -12 Q -15 -12, -15 -9 L -15 9 Q -15 12, -12 12 L 12 12 Q 15 12, 15 9 L 15 -9 Q 15 -12, 12 -12 Z M 5 12 L 8 17 L 2 12 Z" 
            fill="url(#grad2)" filter="url(#glow)"/>
      <!-- Heart inside -->
      <path d="M 0 3 L -4 -2 C -5 -3, -6 -3, -7 -2 C -8 -1, -8 1, -7 2 L 0 9 L 7 2 C 8 1, 8 -1, 7 -2 C 6 -3, 5 -3, 4 -2 Z" 
            fill="white" opacity="0.9"/>
    </g>
    
    <!-- Central connection hub - larger circle with gradient -->
    <circle cx="0" cy="5" r="25" fill="url(#grad1)" opacity="0.2"/>
    <circle cx="0" cy="5" r="20" fill="url(#grad3)" filter="url(#glow)"/>
    
    <!-- Link chain icon in center -->
    <g transform="translate(0, 5)">
      <!-- Left link -->
      <path d="M -8 -3 A 5 5 0 0 1 -8 3 L -3 3 A 5 5 0 0 1 -3 -3 Z" 
            fill="none" stroke="white" stroke-width="3" stroke-linecap="round" opacity="0.95"/>
      <!-- Right link -->
      <path d="M 3 -3 A 5 5 0 0 1 3 3 L 8 3 A 5 5 0 0 1 8 -3 Z" 
            fill="none" stroke="white" stroke-width="3" stroke-linecap="round" opacity="0.95"/>
      <!-- Connection bar -->
      <rect x="-2" y="-1.5" width="4" height="3" fill="white" opacity="0.95" rx="1"/>
    </g>
    
    <!-- Chat bubble 3 (bottom left) -->
    <g transform="translate(-35, 30)">
      <path d="M -10 -8 Q -13 -8, -13 -5 L -13 10 Q -13 13, -10 13 L 10 13 Q 13 13, 13 10 L 13 -5 Q 13 -8, 10 -8 Z M -4 13 L -7 18 L -1 13 Z" 
            fill="url(#grad3)" filter="url(#glow)"/>
      <!-- Smile inside -->
      <circle cx="-5" cy="0" r="2" fill="white" opacity="0.9"/>
      <circle cx="5" cy="0" r="2" fill="white" opacity="0.9"/>
      <path d="M -6 5 Q 0 8, 6 5" stroke="white" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.9"/>
    </g>
    
    <!-- Chat bubble 4 (bottom right) -->
    <g transform="translate(28, 35)">
      <path d="M -10 -10 Q -13 -10, -13 -7 L -13 8 Q -13 11, -10 11 L 13 11 Q 16 11, 16 8 L 16 -7 Q 16 -10, 13 -10 Z M 3 11 L 6 16 L 0 11 Z" 
            fill="url(#grad2)" filter="url(#glow)"/>
      <!-- Thumbs up inside -->
      <path d="M -2 5 L -2 -2 L 0 -5 L 3 -5 L 3 -2 L 5 0 L 5 8 L -2 8 Z M -5 2 L -8 2 L -8 8 L -5 8 Z" 
            fill="white" opacity="0.9"/>
    </g>
    
    <!-- Connection lines between bubbles and center -->
    <line x1="-20" y1="-18" x2="-8" y2="-5" stroke="url(#grad1)" stroke-width="2.5" opacity="0.4" stroke-linecap="round"/>
    <line x1="20" y1="-15" x2="8" y2="-3" stroke="url(#grad2)" stroke-width="2.5" opacity="0.4" stroke-linecap="round"/>
    <line x1="-22" y1="28" x2="-10" y2="14" stroke="url(#grad3)" stroke-width="2.5" opacity="0.4" stroke-linecap="round"/>
    <line x1="20" y1="30" x2="10" y2="16" stroke="url(#grad2)" stroke-width="2.5" opacity="0.4" stroke-linecap="round"/>
    
    <!-- Floating sparkles -->
    <g opacity="0.7">
      <circle cx="-55" cy="-15" r="2.5" fill="#fbbf24"/>
      <circle cx="55" cy="-10" r="2" fill="#f093fb"/>
      <circle cx="-50" cy="20" r="2" fill="#a6c1ee"/>
      <circle cx="50" cy="15" r="2.5" fill="#667eea"/>
      <circle cx="0" cy="-55" r="2" fill="#fbc2eb"/>
      <circle cx="-15" cy="-50" r="1.5" fill="white"/>
      <circle cx="18" cy="-48" r="1.5" fill="white"/>
    </g>
    
  </g>
</svg>
