<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="mainGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#764ba2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f093fb;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fbc2eb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a6c1ee;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background glow -->
  <circle cx="100" cy="100" r="85" fill="url(#mainGrad)" opacity="0.15"/>
  
  <!-- Main icon - Connected people/hearts -->
  <g transform="translate(100, 100)">
    <!-- Left person -->
    <g transform="translate(-35, -5)">
      <circle cx="0" cy="-15" r="12" fill="url(#mainGrad)"/>
      <path d="M -8 -3 Q -10 5, -10 12 L -10 18 Q -10 22, -6 22 L 6 22 Q 10 22, 10 18 L 10 12 Q 10 5, 8 -3 Z" 
            fill="url(#mainGrad)"/>
    </g>
    
    <!-- Right person -->
    <g transform="translate(35, -5)">
      <circle cx="0" cy="-15" r="12" fill="url(#accentGrad)"/>
      <path d="M -8 -3 Q -10 5, -10 12 L -10 18 Q -10 22, -6 22 L 6 22 Q 10 22, 10 18 L 10 12 Q 10 5, 8 -3 Z" 
            fill="url(#accentGrad)"/>
    </g>
    
    <!-- Center person (slightly forward) -->
    <g transform="translate(0, 5)">
      <circle cx="0" cy="-15" r="13" fill="url(#mainGrad)"/>
      <path d="M -9 -3 Q -11 5, -11 12 L -11 18 Q -11 22, -7 22 L 7 22 Q 11 22, 11 18 L 11 12 Q 11 5, 9 -3 Z" 
            fill="url(#mainGrad)"/>
    </g>
    
    <!-- Connection lines -->
    <path d="M -23 5 Q -12 0, 0 0" stroke="url(#accentGrad)" stroke-width="3" fill="none" 
          opacity="0.6" stroke-linecap="round"/>
    <path d="M 23 5 Q 12 0, 0 0" stroke="url(#accentGrad)" stroke-width="3" fill="none" 
          opacity="0.6" stroke-linecap="round"/>
    
    <!-- Hearts around -->
    <g transform="translate(-45, -25) scale(0.5)">
      <path d="M 10 25 C 10 22, 8 20, 5 20 C 2 20, 0 22, 0 25 C 0 22, -2 20, -5 20 C -8 20, -10 22, -10 25 C -10 30, -5 35, 0 40 C 5 35, 10 30, 10 25 Z" 
            fill="url(#accentGrad)" opacity="0.7"/>
    </g>
    
    <g transform="translate(45, -25) scale(0.5)">
      <path d="M 10 25 C 10 22, 8 20, 5 20 C 2 20, 0 22, 0 25 C 0 22, -2 20, -5 20 C -8 20, -10 22, -10 25 C -10 30, -5 35, 0 40 C 5 35, 10 30, 10 25 Z" 
            fill="url(#mainGrad)" opacity="0.7"/>
    </g>
    
    <!-- Bottom decorative elements -->
    <circle cx="-28" cy="30" r="4" fill="url(#accentGrad)" opacity="0.5"/>
    <circle cx="28" cy="30" r="4" fill="url(#accentGrad)" opacity="0.5"/>
    <circle cx="0" cy="35" r="5" fill="url(#mainGrad)" opacity="0.5"/>
    
    <!-- Sparkle effects -->
    <g opacity="0.8">
      <path d="M -50 -10 L -48 -10 M -49 -11 L -49 -9" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
      <path d="M 50 -10 L 52 -10 M 51 -11 L 51 -9" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
      <path d="M -15 -40 L -13 -40 M -14 -41 L -14 -39" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
      <path d="M 15 -40 L 17 -40 M 16 -41 L 16 -39" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
    </g>
  </g>
</svg>
